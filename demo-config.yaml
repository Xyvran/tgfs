telegram:
  api_id: hidden
  api_hash: hidden
  bot:
    session_file: bot.session
    tokens:
      - hidden
  private_file_channel: 'tgfsdemo'
  lib: pyrogram
  # When ``true``, removing a file (or directory) through TGFS also issues
  # ``messages.deleteMessages`` for every backing message in the channel:
  # the JSON file-descriptor message and every content message of every
  # version. Default is ``false`` -- metadata is updated but the original
  # messages stay in the channel, matching historical behavior.
  # The bot account must be an admin of ``private_file_channel`` with the
  # "Delete Messages" permission for this to succeed.
  delete_messages_on_remove: false
tgfs:
  users:
  download:
    chunk_size_kb: 1024
  jwt:
    secret: hidden
    algorithm: HS256
    life: 604800
  metadata:
    type: github_repo
    github_repo:
      repo: 'tgfs-demo/tgfs-demo'
      commit: 'master'
      access_token: hidden
  server:
    host: 0.0.0.0
    port: 1900
  # ---------------------------------------------------------------------------
  # Optional at-rest encryption.
  #
  # When ``enabled: true``, every file uploaded through TGFS is encrypted with
  # AES-256-GCM in 64 KiB chunks *before* it leaves this process. The Telegram
  # channel never sees plaintext, so a compromised channel reveals only
  # ciphertext + a public salt per file.
  #
  # Three ways to supply the passphrase, pick exactly one:
  #   * passphrase       -- inline string (NOT recommended outside dev)
  #   * passphrase_env   -- read from an environment variable
  #   * passphrase_file  -- read from a file (use systemd ``LoadCredential=``)
  #
  # ``master_salt_file`` is created on first run (16 random bytes) and MUST be
  # backed up. Without it the master key cannot be re-derived.
  #
  # ``chunk_size`` defaults to 65536 (64 KiB). Larger -> less overhead, worse
  # random-access granularity; smaller -> more per-chunk auth-tag cost.
  #
  # ``encrypt_names`` (default ``false``) additionally replaces every
  # Telegram-visible document name -- including the pinned metadata blob --
  # with an AES-GCM ciphertext token, so a passive observer of the channel
  # cannot read file or directory names from document metadata. The
  # plaintext names continue to live inside the (also encrypted)
  # metadata.json, so WebDAV and the manager UI are unaffected.
  # Note: only new uploads are affected; previously uploaded files keep
  # their original Telegram document name.
  # ---------------------------------------------------------------------------
  encryption:
    enabled: false
    encrypt_names: false
    # passphrase: "change-me-or-use-a-file"
    passphrase_env: TGFS_MASTER_PASSPHRASE
    # passphrase_file: secrets/master.passphrase
    master_salt_file: master.salt
    chunk_size: 65536
